name: Release Chrome Extension

on:
  push:
    tags:
      - 'v*' # 触发条件：推送以 v 开头的tag

permissions:
  contents: write

env:
  RELEASE_ASSET_NAME: SunoLyricDownloader.zip

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整的 git 历史用于版本号
          
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Get version from git tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Update version in manifest.json
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src/manifest.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Install dependencies
        run: pnpm install

      - name: Create ZIP file
        run: pnpm zip

      - name: Generate release notes
        run: |
          node scripts/generate-release-notes.js \
            --version "$VERSION" \
            --current-tag "$GITHUB_REF_NAME" \
            --asset-name "$RELEASE_ASSET_NAME" \
            --output RELEASE_NOTES.md

      - name: Upload to Chrome Web Store
        if: ${{ env.CHROME_EXTENSION_ID != '' && env.CHROME_CLIENT_ID != '' && env.CHROME_CLIENT_SECRET != '' && env.CHROME_REFRESH_TOKEN != '' }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ env.RELEASE_ASSET_NAME }}
          extension-id: ${{ env.CHROME_EXTENSION_ID }}
          client-id: ${{ env.CHROME_CLIENT_ID }}
          client-secret: ${{ env.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ env.CHROME_REFRESH_TOKEN }}
          publish: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.RELEASE_ASSET_NAME }}
          name: Release ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
